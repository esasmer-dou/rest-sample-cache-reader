# Minimum local profile.
# This file is intentionally small. Use -Dreactor.config.file=src/main/resources/config/production.properties
# or REACTOR_CONFIG_FILE for production and advanced overrides.

server.port=8080
server.host=0.0.0.0
reactor.runtime.profile=micro-rest
reactor.rust.route-workload.cache-read.route-admission.max-concurrent=64
reactor.rust.route-workload.cache-read.route-admission.queue-timeout-ms=25
reactor.rust.route-budget.cache-read-point.route-admission.max-concurrent=128
reactor.rust.route-budget.cache-read-point.route-admission.queue-timeout-ms=25

# Domain cache settings.
sample.cache.customer.namespace=crm.customer
sample.cache.customer.projections=detail,segment,status,campaign,meta
sample.cache.customer.version-cache-ms=1000

# Native Redis reader. Local default is standalone.
reactor.cache.redis.topology=standalone
reactor.cache.redis.access-mode=read-only
reactor.cache.redis.host=127.0.0.1
reactor.cache.redis.port=6379
reactor.cache.redis.read-connections=2
reactor.cache.redis.write-connections=1

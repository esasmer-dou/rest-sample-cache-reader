server.port=8080
server.host=0.0.0.0
reactor.runtime.profile=micro-rest

# The sample is intentionally easy to run. Production builds should generate and require indexes.
reactor.startup.component-index.enabled=false
reactor.startup.component-index.required=false
reactor.startup.route-index.validate=false
reactor.startup.route-index.required=false
reactor.startup.scan.fallback-enabled=true

# Low-RSS REST defaults for cache-backed JSON reads.
reactor.rust.http.max-request-body-bytes=262144
reactor.rust.http.max-response-body-bytes=1048576
reactor.rust.http.max-inflight-body-bytes=1048576
reactor.rust.http.max-inflight-response-bytes=4194304
reactor.rust.http.max-connections=512
reactor.rust.http.max-request-header-bytes=8192
reactor.rust.http.max-request-headers=48
reactor.rust.http.header-read-timeout-ms=3000
reactor.rust.http.request-body-timeout-ms=5000
reactor.rust.http.idle-timeout-ms=30000
reactor.rust.http.http1-only-enabled=true
reactor.rust.http.keep-alive-enabled=true
reactor.rust.log.level=error
reactor.rust.java.log.level=warn
reactor.rust.jni.workers=1
reactor.rust.jni.queue-capacity=128
reactor.rust.response-pool.small-capacity=8
reactor.rust.response-pool.medium-capacity=2
reactor.rust.response-pool.large-capacity=1
reactor.rust.response-pool.huge-capacity=0
reactor.rust.runtime.worker-threads=1
reactor.rust.runtime.max-blocking-threads=1
reactor.rust.runtime.thread-stack-bytes=262144
reactor.rust.native-cache.max-entries=0
reactor.rust.native-cache.max-bytes=0
reactor.rust.route-admission.enabled=true
reactor.rust.route-admission.default-max-concurrent=0
reactor.rust.route-admission.default-queue-timeout-ms=0
reactor.rust.route-admission.get.api.v1.cache.customers.id.max-concurrent=128
reactor.rust.route-admission.get.api.v1.cache.customers.id.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.by-customer-no.max-concurrent=128
reactor.rust.route-admission.get.api.v1.cache.customers.by-customer-no.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.segments.segment.max-concurrent=64
reactor.rust.route-admission.get.api.v1.cache.customers.segments.segment.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.statuses.status.max-concurrent=64
reactor.rust.route-admission.get.api.v1.cache.customers.statuses.status.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.campaigns.campaign.candidates.max-concurrent=64
reactor.rust.route-admission.get.api.v1.cache.customers.campaigns.campaign.candidates.queue-timeout-ms=25

# Domain cache settings.
sample.cache.customer.namespace=crm.customer
sample.cache.customer.detail.namespace=crm.customer.detail
sample.cache.customer.segment.namespace=crm.customer.segment
sample.cache.customer.status.namespace=crm.customer.status
sample.cache.customer.campaign.namespace=crm.customer.campaign
sample.cache.customer.meta.namespace=crm.customer.meta
sample.cache.customer.version-cache-ms=1000

# Native Redis reader. No DB, no scheduler, no Java Redis client.
# Local default is standalone. Use cluster or sentinel in production.
reactor.cache.redis.topology=standalone
reactor.cache.redis.nodes=
reactor.cache.redis.sentinel.master-name=
reactor.cache.redis.sentinel.master-check-ms=1000
reactor.cache.redis.cluster.max-redirects=5
reactor.cache.redis.topology-refresh-ms=30000
reactor.cache.redis.host=127.0.0.1
reactor.cache.redis.port=6379
reactor.cache.redis.username=
reactor.cache.redis.password=
reactor.cache.redis.database=0
reactor.cache.redis.connect-timeout-ms=500
reactor.cache.redis.read-timeout-ms=500
reactor.cache.redis.write-timeout-ms=500
reactor.cache.redis.read-connections=2
reactor.cache.redis.write-connections=1
reactor.cache.redis.max-read-inflight=128
reactor.cache.redis.max-write-inflight=8
reactor.cache.redis.max-response-bytes=1048576

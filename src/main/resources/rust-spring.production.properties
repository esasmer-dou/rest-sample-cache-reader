# Production-oriented copy of rust-spring.properties.
# Use this as the starting point for container/Kubernetes runs after generating component and route indexes.

server.port=8080

# Production low-RSS startup: do not scan classpath at runtime.
reactor.startup.component-index.enabled=true
reactor.startup.component-index.required=true
reactor.startup.route-index.validate=true
reactor.startup.route-index.required=true
reactor.startup.scan.fallback-enabled=false

reactor.runtime.profile=micro-rest
reactor.runtime.footprint-gate.mode=enforce

# Small reader pod defaults. Tune only after measuring p99, 503 ratio and RSS together.
reactor.rust.worker-threads=1
reactor.rust.blocking-threads=1
reactor.rust.jni.workers=2
reactor.rust.jni.queue-capacity=128
reactor.rust.max-connections=256
reactor.rust.max-inflight-response-bytes=4194304
reactor.rust.response-pool.max-small=16
reactor.rust.response-pool.max-medium=0
reactor.rust.response-pool.max-large=0
reactor.rust.response-pool.max-huge=0

# Enable only for low-traffic pods that remain idle between bursts.
reactor.rust.native-trim.enabled=false
reactor.rust.native-trim.initial-delay-ms=30000
reactor.rust.native-trim.interval-ms=60000
reactor.rust.native-trim.min-idle-ms=10000
reactor.rust.native-trim.max-active-connections=0
reactor.rust.native-trim.max-active-requests=0
reactor.rust.native-trim.retain-small=16
reactor.rust.native-trim.retain-medium=0
reactor.rust.native-trim.retain-large=0
reactor.rust.native-trim.retain-huge=0
reactor.rust.native-trim.allocator-trim-enabled=true

# Redis defaults are intentionally small. For HA use sentinel or cluster.
reactor.cache.redis.topology=standalone
reactor.cache.redis.host=127.0.0.1
reactor.cache.redis.port=6379
reactor.cache.redis.nodes=
reactor.cache.redis.sentinel.master-name=
reactor.cache.redis.sentinel.master-check-ms=1000
reactor.cache.redis.connect-timeout-ms=300
reactor.cache.redis.read-timeout-ms=300
reactor.cache.redis.write-timeout-ms=300
reactor.cache.redis.read-connections=2
reactor.cache.redis.write-connections=1
reactor.cache.redis.max-read-inflight=64
reactor.cache.redis.max-write-inflight=16
reactor.cache.redis.max-response-bytes=1048576
reactor.cache.redis.cluster.max-redirects=5
reactor.cache.redis.topology-refresh-ms=30000

sample.cache.customer.namespace=crm.customer
sample.cache.customer.detail.namespace=crm.customer.detail
sample.cache.customer.segment.namespace=crm.customer.segment
sample.cache.customer.status.namespace=crm.customer.status
sample.cache.customer.campaign.namespace=crm.customer.campaign
sample.cache.customer.meta.namespace=crm.customer.meta
sample.cache.customer.version-cache-ms=1000

# Production overlay for rest-sample-cache-reader.
# Apply with:
#   -Dreactor.config.file=src/main/resources/config/production.properties
# or:
#   REACTOR_CONFIG_FILE=/app/config/production.properties

# Production low-RSS startup. Generate component and route indexes before using this.
reactor.startup.component-index.enabled=true
reactor.startup.component-index.required=true
reactor.startup.route-index.validate=true
reactor.startup.route-index.required=true
reactor.startup.scan.fallback-enabled=false
reactor.runtime.low-rss-gate.mode=enforce

# Keep the reader narrow. Raise only after checking p99, 503 ratio and RSS together.
reactor.rust.http.max-connections=512
reactor.rust.jni.workers=1
reactor.rust.jni.queue-capacity=128
reactor.rust.response-pool.small-capacity=8
reactor.rust.response-pool.medium-capacity=2
reactor.rust.response-pool.large-capacity=1
reactor.rust.response-pool.huge-capacity=0

# Redis HA mode. Pick one topology and provide the matching node list in Kubernetes.
# reactor.cache.redis.topology=sentinel
# reactor.cache.redis.nodes=redis-sentinel-0.redis:26379,redis-sentinel-1.redis:26379,redis-sentinel-2.redis:26379
# reactor.cache.redis.sentinel.master-name=mymaster
# reactor.cache.redis.topology=cluster
# reactor.cache.redis.nodes=redis-cluster-0.redis:6379,redis-cluster-1.redis:6379,redis-cluster-2.redis:6379
reactor.cache.redis.access-mode=read-only

reactor.cache.redis.connect-timeout-ms=300
reactor.cache.redis.read-timeout-ms=300
reactor.cache.redis.write-timeout-ms=300
reactor.cache.redis.max-read-inflight=64
reactor.cache.redis.max-write-inflight=16
reactor.cache.redis.max-response-bytes=1048576

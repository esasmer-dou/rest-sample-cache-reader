# Advanced tuning overlay. Use only after endpoint-level p99/RSS measurement.

# Per-route admission. Defaults come from annotations/profile; override only hot routes.
reactor.rust.route-admission.enabled=true
reactor.rust.route-admission.default-max-concurrent=0
reactor.rust.route-admission.default-queue-timeout-ms=0
reactor.rust.route-admission.get.api.v1.cache.customers.id.max-concurrent=128
reactor.rust.route-admission.get.api.v1.cache.customers.id.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.by-customer-no.max-concurrent=128
reactor.rust.route-admission.get.api.v1.cache.customers.by-customer-no.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.segments.segment.max-concurrent=64
reactor.rust.route-admission.get.api.v1.cache.customers.segments.segment.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.statuses.status.max-concurrent=64
reactor.rust.route-admission.get.api.v1.cache.customers.statuses.status.queue-timeout-ms=25
reactor.rust.route-admission.get.api.v1.cache.customers.campaigns.campaign.candidates.max-concurrent=64
reactor.rust.route-admission.get.api.v1.cache.customers.campaigns.campaign.candidates.queue-timeout-ms=25

# Projection namespace overrides. Defaults are derived from sample.cache.customer.namespace.
sample.cache.customer.detail.namespace=crm.customer.detail
sample.cache.customer.segment.namespace=crm.customer.segment
sample.cache.customer.status.namespace=crm.customer.status
sample.cache.customer.campaign.namespace=crm.customer.campaign
sample.cache.customer.meta.namespace=crm.customer.meta

# Native trim is for low-traffic pods that stay idle between bursts.
reactor.rust.native-trim.enabled=false
reactor.rust.native-trim.initial-delay-ms=30000
reactor.rust.native-trim.interval-ms=60000
reactor.rust.native-trim.min-idle-ms=10000
reactor.rust.native-trim.retain-small=16
reactor.rust.native-trim.retain-medium=0
reactor.rust.native-trim.retain-large=0
reactor.rust.native-trim.retain-huge=0
reactor.rust.native-trim.allocator-trim-enabled=true
